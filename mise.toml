[tools]
node = "lts"
rust = "stable"

[tasks.setup]
run = "npm ci"

[tasks.dev]
run = "mkdir -p public && cp node_modules/htmx.org/dist/htmx.min.js public/ && npx @tailwindcss/cli -i ./assets/styles.css -o ./public/styles.css --watch & cargo run"

[tasks."build:assets"]
run = "mkdir -p public && cp node_modules/htmx.org/dist/htmx.min.js public/ && npx @tailwindcss/cli -i ./assets/styles.css -o ./public/styles.css"

[tasks."build:release"]
run = "mise run build:assets && cargo build --release"
